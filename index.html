<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚪ PLINKO · Clean & Addictive</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --panel: #151530;
            --gold: #f0c040;
            --gold2: #ffd700;
            --green: #4caf84;
            --red: #e0556a;
            --blue: #5b9bd5;
            --purple: #b07cd8;
            --text: #e0d8c8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',system-ui,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:10px;
            user-select:none;
            -webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;
        }
        .app {
            width:100%;
            max-width:440px;
            display:flex;
            flex-direction:column;
            gap:10px;
            height:98vh;
            max-height:900px;
        }
        /* HEADER */
        .top-bar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:var(--panel);
            border-radius:18px;
            padding:12px 16px;
            gap:10px;
            flex-shrink:0;
        }
        .logo { font-weight:900; font-size:1.2rem; color:var(--gold2); letter-spacing:1px; }
        .bal {
            font-weight:800;
            font-size:1.3rem;
            color:var(--gold);
            background:#00000030;
            border-radius:25px;
            padding:6px 16px;
        }
        .btn-sm {
            background:#00000030;
            border:1px solid #ffffff20;
            color:#ccc;
            border-radius:20px;
            padding:6px 14px;
            font-weight:700;
            font-size:0.75rem;
            cursor:pointer;
            transition:0.15s;
            white-space:nowrap;
        }
        .btn-sm:active { background:#ffffff20; transform:scale(0.95); }
        /* STATS ROW */
        .stats-row {
            display:flex;
            gap:8px;
            flex-shrink:0;
        }
        .stat-box {
            flex:1;
            background:var(--panel);
            border-radius:14px;
            padding:8px;
            text-align:center;
        }
        .stat-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:1px; color:#888; }
        .stat-val { font-size:1rem; font-weight:900; color:var(--gold); }
        /* BOARD */
        .board-wrap {
            flex:1;
            background:var(--panel);
            border-radius:18px;
            overflow:hidden;
            position:relative;
            min-height:0;
            display:flex;
            flex-direction:column;
        }
        .board-top {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px 14px;
            border-bottom:1px solid #ffffff10;
            flex-shrink:0;
        }
        .board-title { font-weight:700; font-size:0.8rem; color:var(--gold); }
        .ball-types { display:flex; gap:5px; }
        .ball-dot {
            width:22px; height:22px; border-radius:50%; border:2px solid #ffffff30;
            cursor:pointer; transition:0.15s;
        }
        .ball-dot.active { border-color:var(--gold2); box-shadow:0 0 10px var(--gold2); transform:scale(1.15); }
        .ball-dot.gold { background:radial-gradient(circle at 35% 30%,#fff,#f0c040,#a07020); }
        .ball-dot.fire { background:radial-gradient(circle at 35% 30%,#fff,#ff5570,#c02040); }
        .ball-dot.ice { background:radial-gradient(circle at 35% 30%,#fff,#70d0ff,#2060c0); }
        .ball-dot.void { background:radial-gradient(circle at 35% 30%,#e0b0ff,#8020c0,#300050); }
        .canvas-wrap {
            flex:1;
            position:relative;
            min-height:0;
        }
        #plinkoCanvas {
            width:100%;
            height:100%;
            display:block;
        }
        /* BOOST CARDS */
        .boosts-row {
            display:flex;
            gap:6px;
            flex-shrink:0;
            overflow-x:auto;
            padding:2px 0;
            -webkit-overflow-scrolling:touch;
        }
        .boost-card {
            flex-shrink:0;
            width:75px;
            background:var(--panel);
            border:1.5px solid #ffffff15;
            border-radius:14px;
            padding:8px 6px;
            text-align:center;
            cursor:pointer;
            transition:0.15s;
            position:relative;
        }
        .boost-card:active { transform:scale(0.93); background:#ffffff10; }
        .boost-card.active-boost {
            border-color:var(--gold2);
            box-shadow:0 0 12px var(--gold2);
            background:#1a1a35;
        }
        .boost-card.used {
            opacity:0.4;
            pointer-events:none;
            border-color:#ffffff08;
        }
        .boost-icon { font-size:1.4rem; }
        .boost-name { font-size:0.6rem; font-weight:700; color:#aaa; margin-top:2px; }
        .boost-cost { font-size:0.55rem; color:#888; }
        /* CONTROLS */
        .ctrl-row {
            display:flex;
            gap:8px;
            align-items:center;
            flex-shrink:0;
        }
        .bet-ctrl {
            display:flex;
            align-items:center;
            gap:3px;
            background:var(--panel);
            border-radius:25px;
            padding:4px;
        }
        .bet-ctrl button {
            width:30px; height:30px; border-radius:50%;
            background:#ffffff10; border:1px solid #ffffff20; color:var(--gold);
            font-weight:900; font-size:1rem; cursor:pointer;
        }
        .bet-ctrl button:active { background:#ffffff25; }
        .bet-val { font-weight:900; color:var(--gold2); min-width:40px; text-align:center; font-size:0.9rem; }
        .multi-count {
            display:flex;
            align-items:center;
            gap:4px;
            background:var(--panel);
            border-radius:25px;
            padding:4px 10px;
            font-weight:700;
            font-size:0.8rem;
        }
        .multi-count button {
            width:24px; height:24px; border-radius:50%;
            background:#ffffff10; border:1px solid #ffffff20; color:var(--gold);
            font-weight:900; cursor:pointer;
        }
        .drop-btn {
            flex:1;
            background:linear-gradient(180deg,#f0c040,#b08020);
            border:none;
            border-radius:25px;
            padding:12px;
            font-weight:900;
            font-size:0.9rem;
            color:#1a1a30;
            cursor:pointer;
            letter-spacing:1px;
            text-transform:uppercase;
            box-shadow:0 3px 0 #805810;
            transition:0.1s;
            position:relative;
            top:0;
        }
        .drop-btn:active { top:2px; box-shadow:0 1px 0 #805810; }
        .drop-btn:disabled { opacity:0.4; pointer-events:none; filter:grayscale(30%); }
        /* TOAST */
        .toast {
            position:fixed; bottom:25px; left:50%; transform:translateX(-50%) translateY(120px);
            padding:10px 22px; border-radius:25px; font-weight:700; font-size:0.8rem;
            z-index:999; transition:transform 0.35s cubic-bezier(0.68,-0.55,0.265,1.55);
            pointer-events:none; white-space:nowrap;
            background:#222240; border:1px solid #ffffff30; color:#fff; box-shadow:0 8px 20px #00000050;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        @media(max-width:360px) {
            .boost-card { width:60px; }
            .logo { font-size:1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="top-bar">
        <span class="logo">⚪ PLINKO</span>
        <span class="bal" id="balDisp">500</span>
        <button class="btn-sm" onclick="resetAll()">↺ Reset</button>
    </div>
    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-box"><div class="stat-label">Streak</div><div class="stat-val" id="streakVal">0</div></div>
        <div class="stat-box"><div class="stat-label">Mult</div><div class="stat-val" id="multVal">1.0x</div></div>
        <div class="stat-box"><div class="stat-label">Best</div><div class="stat-val" id="bestVal">0</div></div>
        <div class="stat-box"><div class="stat-label">Drops</div><div class="stat-val" id="dropsVal">0</div></div>
    </div>
    <!-- BOARD -->
    <div class="board-wrap">
        <div class="board-top">
            <span class="board-title">PLINKO FIELD</span>
            <div class="ball-types">
                <div class="ball-dot gold active" data-type="gold" onclick="setBallType('gold')"></div>
                <div class="ball-dot fire" data-type="fire" onclick="setBallType('fire')"></div>
                <div class="ball-dot ice" data-type="ice" onclick="setBallType('ice')"></div>
                <div class="ball-dot void" data-type="void" onclick="setBallType('void')"></div>
            </div>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="plinkoCanvas"></canvas>
        </div>
    </div>
    <!-- BOOST CARDS -->
    <div class="boosts-row" id="boostsRow">
        <div class="boost-card" data-boost="protect" onclick="toggleBoost('protect')">
            <div class="boost-icon">🛡️</div><div class="boost-name">Protect</div><div class="boost-cost">Free</div>
        </div>
        <div class="boost-card" data-boost="double" onclick="toggleBoost('double')">
            <div class="boost-icon">✖️2</div><div class="boost-name">Double</div><div class="boost-cost">+10</div>
        </div>
        <div class="boost-card" data-boost="extraBall" onclick="toggleBoost('extraBall')">
            <div class="boost-icon">➕</div><div class="boost-name">+Ball</div><div class="boost-cost">+15</div>
        </div>
        <div class="boost-card" data-boost="reroll" onclick="toggleBoost('reroll')">
            <div class="boost-icon">🎲</div><div class="boost-name">Reroll</div><div class="boost-cost">+20</div>
        </div>
        <div class="boost-card" data-boost="streakShield" onclick="toggleBoost('streakShield')">
            <div class="boost-icon">🔒</div><div class="boost-name">KeepStrk</div><div class="boost-cost">+25</div>
        </div>
    </div>
    <!-- CONTROLS -->
    <div class="ctrl-row">
        <div class="bet-ctrl">
            <button onclick="adjBet(-5)">−</button>
            <span class="bet-val" id="betVal">10</span>
            <button onclick="adjBet(5)">+</button>
        </div>
        <div class="multi-count">
            <button onclick="adjMulti(-1)">−</button>
            <span id="multiVal">1</span>
            <button onclick="adjMulti(1)">+</button>
            <span style="font-size:0.65rem;">balls</span>
        </div>
        <button class="drop-btn" id="dropBtn" onclick="launchBalls()">⚪ DROP</button>
    </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
    // ============ STATE ============
    let balance = 500;
    let bet = 10;
    let multiCount = 1;
    let streak = 0;
    let streakMult = 1.0;
    let bestWin = 0;
    let totalDrops = 0;
    let ballType = 'gold';
    let activeBoosts = {};
    let boostUsedThisRound = {};
    let dropping = false;

    const MULTIPLIERS = [0.2, 0.4, 0.7, 1.0, 1.5, 2.5, 4.0, 2.5, 1.5, 1.0, 0.7, 0.4, 0.2];
    const PEG_ROWS = 9;
    const PEG_COLS = 9;

    let pegs = [];
    let balls = [];
    let sparkles = [];

    // Canvas
    const canvas = document.getElementById('plinkoCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, slotW, slotY, slotH;

    // ============ STORAGE ============
    function save() {
        try { localStorage.setItem('plinkoClean', JSON.stringify({ balance, bestWin, totalDrops })); } catch (e) {}
    }

    function load() {
        try {
            const d = JSON.parse(localStorage.getItem('plinkoClean'));
            if (d) { balance = d.balance ?? 500;
                bestWin = d.bestWin ?? 0;
                totalDrops = d.totalDrops ?? 0; }
        } catch (e) {}
    }

    // ============ UI UPDATES ============
    function ui() {
        document.getElementById('balDisp').textContent = balance;
        document.getElementById('streakVal').textContent = streak;
        document.getElementById('multVal').textContent = streakMult.toFixed(1) + 'x';
        document.getElementById('bestVal').textContent = bestWin;
        document.getElementById('dropsVal').textContent = totalDrops;
        document.getElementById('betVal').textContent = bet;
        document.getElementById('multiVal').textContent = multiCount;
        const btn = document.getElementById('dropBtn');
        const cost = getTotalCost();
        btn.textContent = `⚪ DROP ${multiCount>1?'×'+multiCount:''} (${cost})`;
        btn.disabled = dropping || balance < cost;
        save();
    }

    function getTotalCost() {
        let c = bet * multiCount;
        if (activeBoosts['double']) c += 10;
        if (activeBoosts['extraBall']) c += 15;
        if (activeBoosts['reroll']) c += 20;
        if (activeBoosts['streakShield']) c += 25;
        if (ballType === 'fire') c += bet * multiCount;
        if (ballType === 'void') c += bet * multiCount;
        if (ballType === 'ice') c += Math.floor(bet * multiCount * 0.5);
        return c;
    }

    function setBallType(t) {
        ballType = t;
        document.querySelectorAll('.ball-dot').forEach(d => d.classList.remove('active'));
        document.querySelector(`[data-type="${t}"]`)?.classList.add('active');
    }

    function toggleBoost(id) {
        if (boostUsedThisRound[id]) return;
        if (activeBoosts[id]) { delete activeBoosts[id]; } else { activeBoosts[id] = true; }
        renderBoostCards();
        ui();
    }

    function renderBoostCards() {
        document.querySelectorAll('.boost-card').forEach(card => {
            const id = card.dataset.boost;
            card.classList.remove('active-boost', 'used');
            if (boostUsedThisRound[id]) card.classList.add('used');
            if (activeBoosts[id]) card.classList.add('active-boost');
        });
    }

    function adjBet(d) { bet = Math.max(1, Math.min(balance, bet + d));
        ui(); }

    function adjMulti(d) { multiCount = Math.max(1, Math.min(10, multiCount + d));
        ui(); }

    function resetAll() {
        balance = 500;
        streak = 0;
        streakMult = 1.0;
        bestWin = 0;
        totalDrops = 0;
        activeBoosts = {};
        boostUsedThisRound = {};
        ballType = 'gold';
        multiCount = 1;
        bet = 10;
        renderBoostCards();
        ui();
        toast('🔄 All reset');
    }

    function toast(msg) {
        const el = document.getElementById('toastEl');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // ============ PEGS ============
    function calcPegs() {
        pegs = [];
        const startY = H * 0.06;
        const rowSp = (H * 0.78) / PEG_ROWS;
        const colSp = W / (PEG_COLS + 1);
        for (let r = 0; r < PEG_ROWS; r++) {
            const offX = r % 2 === 0 ? 0 : colSp / 2;
            const n = r % 2 === 0 ? PEG_COLS : PEG_COLS - 1;
            for (let c = 0; c < n; c++) {
                pegs.push({ x: offX + colSp * (c + 1), y: startY + r * rowSp, r: 5, hit: 0 });
            }
        }
        slotY = H * 0.88;
        slotH = H * 0.12;
        slotW = W / MULTIPLIERS.length;
    }

    // ============ DRAWING ============
    function draw() {
        ctx.clearRect(0, 0, W, H);
        // BG
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#12122a');
        bg.addColorStop(0.5, '#181835');
        bg.addColorStop(1, '#0e0e22');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        // Pegs
        pegs.forEach(p => {
            const s = p.hit > 0 ? 1.4 - p.hit : 1;
            const r = p.r * s;
            const g = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.1, p.x, p.y, r);
            g.addColorStop(0, '#ffeebb');
            g.addColorStop(0.5, '#e0b030');
            g.addColorStop(1, '#705010');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();
            if (p.hit > 0) {
                ctx.strokeStyle = `rgba(255,255,255,${p.hit})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
                ctx.stroke();
            }
        });
        // Slots
        MULTIPLIERS.forEach((m, i) => {
            const x = i * slotW;
            const c = m >= 3 ? 'rgba(255,80,120,0.3)' : m >= 1.5 ? 'rgba(255,160,40,0.25)' : 'rgba(255,255,255,0.06)';
            ctx.fillStyle = c;
            ctx.fillRect(x, slotY, slotW - 0.5, slotH);
            ctx.fillStyle = m >= 3 ? '#ff5078' : m >= 1.5 ? '#ffa028' : '#777';
            ctx.font = `bold ${Math.min(13,slotW*0.38)}px 'Segoe UI'`;
            ctx.textAlign = 'center';
            ctx.fillText(m + 'x', x + slotW / 2, slotY + slotH / 2 + 5);
        });
        // Balls
        balls.forEach(b => {
            if (b.done) return;
            // Trail
            if (b.trail.length > 1) {
                ctx.strokeStyle = b.color + '30';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(b.trail[0].x, b.trail[0].y);
                for (let i = 1; i < b.trail.length; i++) ctx.lineTo(b.trail[i].x, b.trail[i].y);
                ctx.stroke();
            }
            // Glow
            const gr = ctx.createRadialGradient(b.x, b.y, b.r * 0.5, b.x, b.y, b.r * 3);
            gr.addColorStop(0, b.glow);
            gr.addColorStop(1, 'transparent');
            ctx.fillStyle = gr;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r * 3, 0, Math.PI * 2);
            ctx.fill();
            // Body
            const bg2 = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.15, b.x, b.y, b.r);
            bg2.addColorStop(0, '#fff');
            bg2.addColorStop(0.35, b.color);
            bg2.addColorStop(1, '#000');
            ctx.fillStyle = bg2;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.beginPath();
            ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.28, 0, Math.PI * 2);
            ctx.fill();
        });
        // Sparkles
        sparkles.forEach(s => {
            ctx.fillStyle = s.color;
            ctx.globalAlpha = s.a;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    function ballColor() {
        if (ballType === 'fire') return { color: '#ff5570', glow: 'rgba(255,85,112,0.7)' };
        if (ballType === 'ice') return { color: '#70d0ff', glow: 'rgba(112,208,255,0.7)' };
        if (ballType === 'void') return { color: '#c070f0', glow: 'rgba(192,112,240,0.7)' };
        return { color: '#f0c040', glow: 'rgba(240,192,64,0.7)' };
    }

    function spark(x, y, n, col) {
        for (let i = 0; i < n; i++) {
            sparkles.push({
                x,
                y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4 - 2,
                r: Math.random() * 3 + 1,
                color: col || '#ffeebb',
                a: 1,
                life: 15 + Math.random() * 20
            });
        }
        if (sparkles.length > 200) sparkles.splice(0, 50);
    }

    // ============ PHYSICS ============
    function launchBalls() {
        if (dropping) return;
        const cost = getTotalCost();
        if (balance < cost) { toast('Not enough tokens!'); return; }
        balance -= cost;
        dropping = true;
        totalDrops += multiCount;
        // Mark boosts as used for this round
        Object.keys(activeBoosts).forEach(k => { boostUsedThisRound[k] = true; });
        const boostsSnapshot = { ...activeBoosts };
        activeBoosts = {};
        renderBoostCards();
        ui();

        for (let i = 0; i < multiCount; i++) {
            const startX = W * 0.15 + (Math.random() * W * 0.7);
            const bc = ballColor();
            const ball = {
                x: startX,
                y: 6,
                vx: (Math.random() - 0.5) * 1.5,
                vy: 0.5,
                r: 8,
                color: bc.color,
                glow: bc.glow,
                trail: [],
                done: false,
                resultMult: 0,
                landed: false,
                timer: 0
            };
            balls.push(ball);
            simulate(ball, boostsSnapshot, i === 0);
        }
    }

    function simulate(ball, boosts, isFirst) {
        function step() {
            if (ball.done) return;
            if (ball.landed) {
                ball.timer++;
                if (ball.timer > 50) { ball.done = true;
                    checkAllDone(); }
                return;
            }
            ball.vy += 0.3;
            ball.y += ball.vy;
            ball.x += ball.vx;
            ball.vx *= 0.998;
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > 25) ball.trail.shift();

            // Peg collision
            pegs.forEach(p => {
                const dx = ball.x - p.x;
                const dy = ball.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minD = ball.r + p.r;
                if (dist < minD && ball.vy > 0) {
                    const ang = Math.atan2(dy, dx);
                    ball.x = p.x + Math.cos(ang) * minD;
                    ball.y = p.y + Math.sin(ang) * minD;
                    const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) * 0.65;
                    ball.vx = Math.cos(ang) * spd + (Math.random() - 0.5) * 2;
                    ball.vy = -Math.abs(Math.sin(ang) * spd) * 0.5;
                    p.hit = 1;
                    spark(p.x, p.y, 4, ball.color);
                    if (ballType === 'void' && Math.random() < 0.25) ball.x += (Math.random() - 0.5) * 60;
                }
            });
            // Walls
            if (ball.x < ball.r) { ball.x = ball.r;
                ball.vx = Math.abs(ball.vx) * 0.5; }
            if (ball.x > W - ball.r) { ball.x = W - ball.r;
                ball.vx = -Math.abs(ball.vx) * 0.5; }
            // Land
            if (ball.y >= slotY && !ball.landed) {
                ball.landed = true;
                const idx = Math.min(Math.floor(ball.x / slotW), MULTIPLIERS.length - 1);
                ball.resultMult = MULTIPLIERS[Math.max(0, idx)];
                // Apply boosts
                let finalMult = ball.resultMult;
                if (boosts['double']) finalMult *= 2;
                if (boosts['reroll'] && finalMult < 1.0 && Math.random() < 0.5) {
                    finalMult = MULTIPLIERS[Math.floor(Math.random() * MULTIPLIERS.length)];
                    spark(ball.x, slotY, 15, '#ffd700');
                }
                // Ice ball floors at 0.7
                if (ballType === 'ice' && finalMult < 0.7) finalMult = 0.7;
                const winAmt = Math.floor(bet * finalMult * streakMult);
                if (winAmt > 0) {
                    balance += winAmt;
                    if (!boosts['streakShield'] || finalMult >= 1.0) {
                        streak++;
                        streakMult = Math.min(5.0, 1.0 + streak * 0.3);
                    }
                    if (winAmt > bestWin) bestWin = winAmt;
                    if (finalMult >= 3) spark(ball.x, slotY, 30, '#ffd700');
                } else {
                    if (boosts['protect'] && isFirst) {
                        balance += bet;
                        toast('🛡️ Protection saved your bet!');
                    } else if (!boosts['streakShield']) {
                        streak = Math.max(0, streak - 2);
                        streakMult = Math.max(1.0, 1.0 + streak * 0.3);
                    }
                }
                spark(ball.x, slotY, winAmt > 0 ? 20 : 8, winAmt > 0 ? '#ffd700' : '#ff8888');
                ui();
            }
            if (ball.y > H + 60 && !ball.landed) { ball.landed = true;
                ball.resultMult = 0; }
        }

        function anim() {
            step();
            if (!ball.done) requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
    }

    function checkAllDone() {
        if (balls.every(b => b.done)) {
            dropping = false;
            balls = [];
            boostUsedThisRound = {};
            renderBoostCards();
            ui();
        }
    }

    // ============ LOOP ============
    function updateSparkles() {
        sparkles = sparkles.filter(s => { s.x += s.vx;
            s.y += s.vy;
            s.vy += 0.08;
            s.life--;
            s.a = s.life / 35; return s.life > 0; });
    }

    function updatePegs() {
        pegs.forEach(p => { if (p.hit > 0) p.hit -= 0.04; if (p.hit < 0) p.hit = 0; });
    }

    function loop() {
        updatePegs();
        updateSparkles();
        draw();
        requestAnimationFrame(loop);
    }

    function resize() {
        const wrap = document.getElementById('canvasWrap');
        const r = wrap.getBoundingClientRect();
        W = r.width;
        H = r.height;
        canvas.width = W;
        canvas.height = H;
        calcPegs();
    }

    // ============ INIT ============
    window.addEventListener('resize', resize);
    window.addEventListener('DOMContentLoaded', () => {
        load();
        resize();
        calcPegs();
        ui();
        renderBoostCards();
        loop();
    });

    // Keyboard
    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault();
            launchBalls(); }
        if (e.code === 'ArrowUp') adjBet(5);
        if (e.code === 'ArrowDown') adjBet(-5);
        if (e.code === 'ArrowRight') adjMulti(1);
        if (e.code === 'ArrowLeft') adjMulti(-1);
    });
</script>
</body>
</html>
