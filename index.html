<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚪ PLINKO · Clean & Addictive</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --panel: #151530;
            --gold: #f0c040;
            --gold2: #ffd700;
            --green: #4caf84;
            --red: #e0556a;
            --blue: #5b9bd5;
            --purple: #b07cd8;
            --text: #e0d8c8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',system-ui,sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:10px;
            user-select:none;
            -webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;
        }
        .app {
            width:100%;
            max-width:440px;
            display:flex;
            flex-direction:column;
            gap:10px;
            height:98vh;
            max-height:900px;
        }
        /* HEADER */
        .top-bar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:var(--panel);
            border-radius:18px;
            padding:12px 16px;
            gap:10px;
            flex-shrink:0;
        }
        .logo { font-weight:900; font-size:1.2rem; color:var(--gold2); letter-spacing:1px; }
        .bal {
            font-weight:800;
            font-size:1.3rem;
            color:var(--gold);
            background:#00000030;
            border-radius:25px;
            padding:6px 16px;
        }
        .btn-sm {
            background:#00000030;
            border:1px solid #ffffff20;
            color:#ccc;
            border-radius:20px;
            padding:6px 14px;
            font-weight:700;
            font-size:0.75rem;
            cursor:pointer;
            transition:0.15s;
            white-space:nowrap;
        }
        .btn-sm:active { background:#ffffff20; transform:scale(0.95); }
        /* STATS ROW */
        .stats-row {
            display:flex;
            gap:8px;
            flex-shrink:0;
        }
        .stat-box {
            flex:1;
            background:var(--panel);
            border-radius:14px;
            padding:8px;
            text-align:center;
        }
        .stat-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:1px; color:#888; }
        .stat-val { font-size:1rem; font-weight:900; color:var(--gold); }
        /* BOARD */
        .board-wrap {
            flex:1;
            background:var(--panel);
            border-radius:18px;
            overflow:hidden;
            position:relative;
            min-height:0;
            display:flex;
            flex-direction:column;
        }
        .board-top {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px 14px;
            border-bottom:1px solid #ffffff10;
            flex-shrink:0;
        }
        .board-title { font-weight:700; font-size:0.8rem; color:var(--gold); }
        .ball-types { display:flex; gap:5px; }
        .ball-dot {
            width:22px; height:22px; border-radius:50%; border:2px solid #ffffff30;
            cursor:pointer; transition:0.15s;
        }
        .ball-dot.active { border-color:var(--gold2); box-shadow:0 0 10px var(--gold2); transform:scale(1.15); }
        .ball-dot.gold { background:radial-gradient(circle at 35% 30%,#fff,#f0c040,#a07020); }
        .ball-dot.fire { background:radial-gradient(circle at 35% 30%,#fff,#ff5570,#c02040); }
        .ball-dot.ice { background:radial-gradient(circle at 35% 30%,#fff,#70d0ff,#2060c0); }
        .ball-dot.void { background:radial-gradient(circle at 35% 30%,#e0b0ff,#8020c0,#300050); }
        .canvas-wrap {
            flex:1;
            position:relative;
            min-height:0;
        }
        #plinkoCanvas {
            width:100%;
            height:100%;
            display:block;
        }
        /* BOOST CARDS */
        .boosts-row {
            display:flex;
            gap:6px;
            flex-shrink:0;
            overflow-x:auto;
            padding:2px 0;
            -webkit-overflow-scrolling:touch;
        }
        .boost-card {
            flex-shrink:0;
            width:75px;
            background:var(--panel);
            border:1.5px solid #ffffff15;
            border-radius:14px;
            padding:8px 6px;
            text-align:center;
            cursor:pointer;
            transition:0.15s;
            position:relative;
        }
        .boost-card:active { transform:scale(0.93); background:#ffffff10; }
        .boost-card.active-boost {
            border-color:var(--gold2);
            box-shadow:0 0 12px var(--gold2);
            background:#1a1a35;
        }
        .boost-card.used {
            opacity:0.4;
            pointer-events:none;
            border-color:#ffffff08;
        }
        .boost-icon { font-size:1.4rem; }
        .boost-name { font-size:0.6rem; font-weight:700; color:#aaa; margin-top:2px; }
        .boost-cost { font-size:0.55rem; color:#888; }
        /* CONTROLS */
        .ctrl-row {
            display:flex;
            gap:8px;
            align-items:center;
            flex-shrink:0;
        }
        .bet-ctrl {
            display:flex;
            align-items:center;
            gap:3px;
            background:var(--panel);
            border-radius:25px;
            padding:4px;
        }
        .bet-ctrl button {
            width:30px; height:30px; border-radius:50%;
            background:#ffffff10; border:1px solid #ffffff20; color:var(--gold);
            font-weight:900; font-size:1rem; cursor:pointer;
        }
        .bet-ctrl button:active { background:#ffffff25; }
        .bet-val { font-weight:900; color:var(--gold2); min-width:40px; text-align:center; font-size:0.9rem; }
        .multi-count {
            display:flex;
            align-items:center;
            gap:4px;
            background:var(--panel);
            border-radius:25px;
            padding:4px 10px;
            font-weight:700;
            font-size:0.8rem;
        }
        .multi-count button {
            width:24px; height:24px; border-radius:50%;
            background:#ffffff10; border:1px solid #ffffff20; color:var(--gold);
            font-weight:900; cursor:pointer;
        }
        .drop-btn {
            flex:1;
            background:linear-gradient(180deg,#f0c040,#b08020);
            border:none;
            border-radius:25px;
            padding:12px;
            font-weight:900;
            font-size:0.9rem;
            color:#1a1a30;
            cursor:pointer;
            letter-spacing:1px;
            text-transform:uppercase;
            box-shadow:0 3px 0 #805810;
            transition:0.1s;
            position:relative;
            top:0;
        }
        .drop-btn:active { top:2px; box-shadow:0 1px 0 #805810; }
        .drop-btn:disabled { opacity:0.4; pointer-events:none; filter:grayscale(30%); }
        /* TOAST */
        .toast {
            position:fixed; bottom:25px; left:50%; transform:translateX(-50%) translateY(120px);
            padding:10px 22px; border-radius:25px; font-weight:700; font-size:0.8rem;
            z-index:999; transition:transform 0.35s cubic-bezier(0.68,-0.55,0.265,1.55);
            pointer-events:none; white-space:nowrap;
            background:#222240; border:1px solid #ffffff30; color:#fff; box-shadow:0 8px 20px #00000050;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        @media(max-width:360px) {
            .boost-card { width:60px; }
            .logo { font-size:1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="top-bar">
        <span class="logo">⚪ PLINKO</span>
        <span class="bal" id="balDisp">500</span>
        <button class="btn-sm" onclick="resetAll()">↺ Reset</button>
    </div>
    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-box"><div class="stat-label">Streak</div><div class="stat-val" id="streakVal">0</div></div>
        <div class="stat-box"><div class="stat-label">Mult</div><div class="stat-val" id="multVal">1.0x</div></div>
        <div class="stat-box"><div class="stat-label">Best</div><div class="stat-val" id="bestVal">0</div></div>
        <div class="stat-box"><div class="stat-label">Drops</div><div class="stat-val" id="dropsVal">0</div></div>
    </div>
    <!-- BOARD -->
    <div class="board-wrap">
        <div class="board-top">
            <span class="board-title">PLINKO FIELD</span>
            <div class="ball-types">
                <div class="ball-dot gold active" data-type="gold" onclick="setBallType('gold')"></div>
                <div class="ball-dot fire" data-type="fire" onclick="setBallType('fire')"></div>
                <div class="ball-dot ice" data-type="ice" onclick="setBallType('ice')"></div>
                <div class="ball-dot void" data-type="void" onclick="setBallType('void')"></div>
            </div>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="plinkoCanvas"></canvas>
        </div>
    </div>
    <!-- BOOST CARDS -->
    <div class="boosts-row" id="boostsRow">
        <div class="boost-card" data-boost="protect" onclick="toggleBoost('protect')">
            <div class="boost-icon">🛡️</div><div class="boost-name">Protect</div><div class="boost-cost">Free</div>
        </div>
        <div class="boost-card" data-boost="double" onclick="toggleBoost('double')">
            <div class="boost-icon">✖️2</div><div class="boost-name">Double</div><div class="boost-cost">+10</div>
        </div>
        <div class="boost-card" data-boost="extraBall" onclick="toggleBoost('extraBall')">
            <div class="boost-icon">➕</div><div class="boost-name">+Ball</div><div class="boost-cost">+15</div>
        </div>
        <div class="boost-card" data-boost="reroll" onclick="toggleBoost('reroll')">
            <div class="boost-icon">🎲</div><div class="boost-name">Reroll</div><div class="boost-cost">+20</div>
        </div>
        <div class="boost-card" data-boost="streakShield" onclick="toggleBoost('streakShield')">
            <div class="boost-icon">🔒</div><div class="boost-name">KeepStrk</div><div class="boost-cost">+25</div>
        </div>
    </div>
    <!-- CONTROLS -->
    <div class="ctrl-row">
        <div class="bet-ctrl">
            <button onclick="adjBet(-5)">−</button>
            <span class="bet-val" id="betVal">10</span>
            <button onclick="adjBet(5)">+</button>
        </div>
        <div class="multi-count">
            <button onclick="adjMulti(-1)">−</button>
            <span id="multiVal">1</span>
            <button onclick="adjMulti(1)">+</button>
            <span style="font-size:0.65rem;">balls</span>
        </div>
        <button class="drop-btn" id="dropBtn" onclick="launchBalls()">⚪ DROP</button>
    </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
/* ============================
   ⚡ HIGH PERFORMANCE ENGINE
============================ */

let balance = 500;
let bet = 10;
let multiCount = 1;
let streak = 0;
let streakMult = 1;
let bestWin = 0;
let totalDrops = 0;

let balls = [];
let pegs = [];
let sparkles = [];

let dropping = false;

const MULTIPLIERS = [0.2,0.4,0.7,1,1.5,2.5,4,2.5,1.5,1,0.7,0.4,0.2];

const canvas = document.getElementById("plinkoCanvas");
const ctx = canvas.getContext("2d");

let W,H,slotW,slotY;

/* ============================
   ⚙️ RESIZE
============================ */
function resize(){
    const r = canvas.parentElement.getBoundingClientRect();
    W = canvas.width = r.width;
    H = canvas.height = r.height;

    slotY = H*0.88;
    slotW = W / MULTIPLIERS.length;

    buildPegs();
}
window.addEventListener("resize",resize);

/* ============================
   ⚙️ PEG GRID (optimized)
============================ */
const grid = {};
const CELL = 60;

function gridKey(x,y){
    return ((x/CELL)|0)+"," + ((y/CELL)|0);
}

function buildPegs(){
    pegs = [];
    for(let k in grid) delete grid[k];

    const rows = 9;
    const cols = 9;

    const rowGap = H*0.08;
    const colGap = W/(cols+1);

    for(let r=0;r<rows;r++){
        const offset = (r%2)*colGap/2;
        const count = r%2===0 ? cols : cols-1;

        for(let c=0;c<count;c++){
            let p = {
                x: offset + colGap*(c+1),
                y: 60 + r*rowGap,
                r: 5
            };
            pegs.push(p);

            const key = gridKey(p.x,p.y);
            if(!grid[key]) grid[key]=[];
            grid[key].push(p);
        }
    }
}

/* ============================
   🎯 DROP
============================ */
function launchBalls(){
    if(dropping) return;

    const cost = bet * multiCount;
    if(balance < cost) return;

    balance -= cost;
    dropping = true;

    for(let i=0;i<multiCount;i++){
        balls.push(createBall());
    }
}

function createBall(){
    return {
        x: W*0.5 + (Math.random()-0.5)*W*0.4,
        y: 0,
        vx: (Math.random()-0.5)*1.2,
        vy: 0,
        r: 8,
        trail: [],
        done:false
    };
}

/* ============================
   🧠 ADDICTIVE BIAS
============================ */
function applyBias(ball){
    // slight pull toward center (creates "near miss" effect)
    const center = W/2;
    const dx = center - ball.x;
    ball.vx += dx * 0.0005;
}

/* ============================
   ⚡ PHYSICS STEP
============================ */
function stepBall(b){

    if(b.done) return;

    b.vy += 0.35;
    applyBias(b);

    b.x += b.vx;
    b.y += b.vy;

    b.vx *= 0.995;

    // walls
    if(b.x < b.r){ b.x=b.r; b.vx*=-0.6; }
    if(b.x > W-b.r){ b.x=W-b.r; b.vx*=-0.6; }

    // GRID COLLISION (fast)
    const key = gridKey(b.x,b.y);
    const nearby = grid[key] || [];

    for(let p of nearby){
        const dx = b.x - p.x;
        const dy = b.y - p.y;

        const dist2 = dx*dx + dy*dy;
        const min = (b.r + p.r);

        if(dist2 < min*min){
            const dist = Math.sqrt(dist2);
            const nx = dx / dist;
            const ny = dy / dist;

            b.x = p.x + nx * min;
            b.y = p.y + ny * min;

            const speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy)*0.7;

            b.vx = nx*speed + (Math.random()-0.5)*1.5;
            b.vy = -Math.abs(ny*speed)*0.6;

            spawnSpark(b.x,b.y,3);
        }
    }

    // landing
    if(b.y >= slotY){
        b.done = true;
        resolveBall(b);
    }

    // trail (optimized)
    if(b.trail.length > 15) b.trail.shift();
    b.trail.push({x:b.x,y:b.y});
}

/* ============================
   💰 REWARD SYSTEM
============================ */
function resolveBall(b){

    let index = Math.floor(b.x/slotW);
    index = Math.max(0,Math.min(index,MULTIPLIERS.length-1));

    let mult = MULTIPLIERS[index];

    // 🎯 RARE JACKPOT BOOST
    if(Math.random() < 0.02){
        mult *= 2;
        screenShake(10);
    }

    const win = Math.floor(bet * mult * streakMult);

    // micro delay (adds anticipation)
    setTimeout(()=>{
        if(win > 0){
            balance += win;
            streak++;
            streakMult = 1 + streak*0.25;
            spawnSpark(b.x,slotY,15);
        }else{
            streak = Math.max(0,streak-2);
            streakMult = 1 + streak*0.25;
        }
    },80);
}

/* ============================
   ✨ PARTICLES (pooled)
============================ */
function spawnSpark(x,y,n){
    for(let i=0;i<n;i++){
        sparkles.push({
            x,y,
            vx:(Math.random()-0.5)*3,
            vy:(Math.random()-0.5)*3,
            life:20
        });
    }
}

function updateSpark(){
    for(let i=sparkles.length-1;i>=0;i--){
        let s = sparkles[i];
        s.x+=s.vx;
        s.y+=s.vy;
        s.life--;
        if(s.life<=0) sparkles.splice(i,1);
    }
}

/* ============================
   🎨 DRAW
============================ */
function draw(){

    ctx.clearRect(0,0,W,H);

    // pegs
    ctx.fillStyle="#e0b030";
    for(let p of pegs){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,6.28);
        ctx.fill();
    }

    // balls
    for(let b of balls){

        // trail
        ctx.strokeStyle="rgba(255,255,255,0.2)";
        ctx.beginPath();
        for(let i=0;i<b.trail.length;i++){
            let t=b.trail[i];
            if(i===0) ctx.moveTo(t.x,t.y);
            else ctx.lineTo(t.x,t.y);
        }
        ctx.stroke();

        // body
        ctx.fillStyle="#f0c040";
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,6.28);
        ctx.fill();
    }

    // sparkles
    ctx.fillStyle="#fff";
    for(let s of sparkles){
        ctx.globalAlpha = s.life/20;
        ctx.fillRect(s.x,s.y,2,2);
    }
    ctx.globalAlpha = 1;
}

/* ============================
   📳 SCREEN SHAKE
============================ */
let shake = 0;
function screenShake(power){
    shake = power;
}

/* ============================
   🔁 LOOP
============================ */
function loop(){

    // physics
    for(let b of balls) stepBall(b);

    // cleanup
    balls = balls.filter(b=>!b.done);

    if(balls.length===0) dropping=false;

    updateSpark();

    // shake
    if(shake>0){
        ctx.setTransform(1,0,0,1,
            (Math.random()-0.5)*shake,
            (Math.random()-0.5)*shake
        );
        shake*=0.85;
    }else{
        ctx.setTransform(1,0,0,1,0,0);
    }

    draw();
    requestAnimationFrame(loop);
}

/* ============================
   INIT
============================ */
window.onload = ()=>{
    resize();
    loop();
};

</script>
</body>
</html>
